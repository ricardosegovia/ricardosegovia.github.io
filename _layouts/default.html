<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} / {% endif %}{{ site.name }} / {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ '/style.css' | relative_url }}?v={{ site.time | date: '%s' }}" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ '/feed.xml' | relative_url }}" />
  </head>

  <body>
    <header class="site-header">
      <div class="container masthead">
        <div class="site-identity">
          <a href="{{ '/' | relative_url }}" class="site-avatar" aria-label="{{ site.name }}">
            <img src="{{ '/images/web2024-ricardo-segovia.jpg' | relative_url }}" alt="Ricardo Segovia" />
          </a>

          <div class="site-info">
            <a href="{{ '/' | relative_url }}" class="site-name">{{ site.name }}</a>
            <p class="site-description">
              <span data-lang="en">{{ site.description }}</span>
              <span data-lang="es" hidden>{{ site.description_es | default: site.description }}</span>
            </p>
          </div>
        </div>

        <div class="site-actions">
          <nav class="site-nav" aria-label="Primary">
            <a href="{{ '/' | relative_url }}">
              <span data-lang="en">Home</span>
              <span data-lang="es" hidden>Inicio</span>
            </a>
            <a href="{{ '/blog/' | relative_url }}">Blog</a>
            <a href="{{ '/news/' | relative_url }}">
              <span data-lang="en">News</span>
              <span data-lang="es" hidden>Noticias</span>
            </a>
            <a href="{{ '/Ricardo_Segovia_CV.pdf' | relative_url }}">CV</a>
            <a href="https://orcid.org/0000-0002-8787-619X">ORCID</a>
          </nav>

          <div class="language-tabs" role="group" aria-label="Language selector">
            <button class="language-tab" type="button" data-set-language="en" aria-pressed="true">EN</button>
            <button class="language-tab" type="button" data-set-language="es" aria-pressed="false">ES</button>
          </div>
        </div>
      </div>
    </header>

    <main id="main" role="main" class="container site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer">
          {% include svg-icons.html %}
        </div>
      </div>
    </footer>

    {% include analytics.html %}
    <script src="{{ '/assets/js/language.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
  </body>
</html>
